<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonteDourada - Cadastro de Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ALERT OVERLAY -->
    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box" id="alertBox">
            <div class="alert-icon" id="alertIcon">⚠️</div>
            <h3 id="alertTitle">Alerta</h3>
            <p id="alertMsg">Mensagem</p>
            <button class="alert-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <header>
        <div class="logo"><img src="img/PonteDourada.png"></div>
        <div class="header-actions">
            <span id="sectorBadge" class="user-badge">PERFIL</span>
            <button class="btn-sair" onclick="window.location.href='main.html'">← Voltar</button>
        </div>
    </header>

    <main class="main-content">
        <div class="card-form">
            <div class="form-header">
                <h2>Cadastro de Produtos</h2>
                <p>Preencha os dados do produto a ser cadastrado.</p>
            </div>

            <form id="formProdutos" onsubmit="submitForm(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome_produto">NOME DO PRODUTO *</label>
                        <input type="text" id="nome_produto" placeholder="Ex: Curativo Simples" required>
                    </div>

                    <div class="form-group">
                        <label for="tipo_produto">TIPO *</label>
                        <select id="tipo_produto" required>
                            <option value="" disabled selected>Selecione...</option>
                            <option value="material">Material</option>
                            <option value="medicamento">Medicamento</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="fornecedor">FORNECEDOR *</label>
                        <select id="fornecedor" required>
                            <option value="" disabled selected>Selecione...</option>
                            <option value="1">Fornecedor A</option>
                            <option value="2">Fornecedor B</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="observacoes">OBSERVAÇÕES</label>
                        <textarea id="observacoes" placeholder="Observações adicionais..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="clearForm('formProdutos')">Cancelar</button>
                    <button type="submit" class="btn btn-save">Salvar Cadastro</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://unpkg.com/imask@7.6.1/dist/imask.min.js"></script>
    <script src="js/script.js"></script>
    <script>initFormPage('produtos');</script>
</body>
</html>
