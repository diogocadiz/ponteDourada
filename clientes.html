<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonteDourada - Cadastro de Clientes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ALERT OVERLAY -->
    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box" id="alertBox">
            <div class="alert-icon" id="alertIcon">⚠️</div>
            <h3 id="alertTitle">Alerta</h3>
            <p id="alertMsg">Mensagem</p>
            <button class="alert-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <header>
        <div class="logo"><img src="img/PonteDourada.png"></div>
        <div class="header-actions">
            <span id="sectorBadge" class="user-badge">PERFIL</span>
            <button class="btn-sair" onclick="window.location.href='main.html'">← Voltar</button>
        </div>
    </header>

    <main class="main-content">
        <div class="card-form">
            <div class="form-header">
                <h2>Cadastro de Clientes</h2>
                <p>Adicione um novo cliente à Central de Atendimento.</p>
            </div>

            <form id="formClientes" onsubmit="submitForm(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome_completo">NOME COMPLETO *</label>
                        <input type="text" id="nome_completo" placeholder="Nome do cliente" required>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" data-mask="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="data_nascimento">DATA DE NASCIMENTO *</label>
                        <input type="date" id="data_nascimento" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">TELEFONE *</label>
                        <input type="text" id="telefone" data-mask="telefone" placeholder="(21) 99999-0000" required>
                    </div>

                    <div class="form-group">
                        <label for="logradouro">LOGRADOURO *</label>
                        <input type="text" id="logradouro" placeholder="Rua, Av..." required>
                    </div>

                    <div class="form-group">
                        <label for="numero">NÚMERO *</label>
                        <input type="text" id="numero" placeholder="123" required>
                    </div>

                    <div class="form-group">
                        <label for="bairro">BAIRRO *</label>
                        <input type="text" id="bairro" placeholder="Bairro" required>
                    </div>

                    <div class="form-group">
                        <label for="cidade">CIDADE *</label>
                        <input type="text" id="cidade" placeholder="Cidade" required>
                    </div>

                    <div class="form-group">
                        <label for="estado">ESTADO *</label>
                        <select id="estado" required>
                            <option value="" disabled selected>UF</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cep">CEP *</label>
                        <input type="text" id="cep" data-mask="cep" placeholder="00000-000" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="observacoes">OBSERVAÇÕES</label>
                        <textarea id="observacoes" placeholder="Informações adicionais..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="clearForm('formClientes')">Cancelar</button>
                    <button type="submit" class="btn btn-save">Salvar Cadastro</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://unpkg.com/imask@7.6.1/dist/imask.min.js"></script>
    <script src="js/script.js"></script>
    <script>initFormPage('clientes');</script>
</body>
</html>
