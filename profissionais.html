<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonteDourada - Cadastro de Profissionais</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ALERT OVERLAY -->
    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box" id="alertBox">
            <div class="alert-icon" id="alertIcon">⚠️</div>
            <h3 id="alertTitle">Alerta</h3>
            <p id="alertMsg">Mensagem</p>
            <button class="alert-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <header>
        <div class="logo"><img src="img/PonteDourada.png"></div>
        <div class="header-actions">
            <span id="sectorBadge" class="user-badge">PERFIL</span>
            <button class="btn-sair" onclick="window.location.href='main.html'">← Voltar</button>
        </div>
    </header>

    <main class="main-content">
        <div class="card-form">
            <div class="form-header">
                <h2>Cadastro de Profissionais</h2>
                <p>Cadastre um novo profissional de saúde.</p>
            </div>

            <form id="formProfissionais" onsubmit="submitForm(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome_completo">NOME COMPLETO *</label>
                        <input type="text" id="nome_completo" placeholder="Nome do profissional" required>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" data-mask="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="tipo_profissional">TIPO PROFISSIONAL *</label>
                        <select id="tipo_profissional" required>
                            <option value="" disabled selected>Selecione...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="conselho_registro">CONSELHO DE REGISTRO *</label>
                        <input type="text" id="conselho_registro" placeholder="CRM 12345 / COREN 67890" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">TELEFONE *</label>
                        <input type="text" id="telefone" data-mask="telefone" placeholder="(21) 99999-0000" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-MAIL *</label>
                        <input type="email" id="email" placeholder="profissional@email.com" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="clearForm('formProfissionais')">Cancelar</button>
                    <button type="submit" class="btn btn-save">Salvar Cadastro</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://unpkg.com/imask@7.6.1/dist/imask.min.js"></script>
    <script src="js/script.js"></script>
    <script>initFormPage('profissionais');</script>
</body>
</html>
