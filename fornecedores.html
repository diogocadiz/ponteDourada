<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonteDourada - Cadastro de Fornecedores</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ALERT OVERLAY -->
    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box" id="alertBox">
            <div class="alert-icon" id="alertIcon">⚠️</div>
            <h3 id="alertTitle">Alerta</h3>
            <p id="alertMsg">Mensagem</p>
            <button class="alert-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <header>
        <div class="logo"><img src="img/PonteDourada.png"></div>
        <div class="header-actions">
            <span id="sectorBadge" class="user-badge">PERFIL</span>
            <button class="btn-sair" onclick="window.location.href='main.html'">← Voltar</button>
        </div>
    </header>

    <main class="main-content">
        <div class="card-form">
            <div class="form-header">
                <h2>Cadastro de Fornecedores</h2>
                <p>Cadastre um novo fornecedor de produtos.</p>
            </div>

            <form id="formFornecedores" onsubmit="submitForm(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="razao_social">RAZÃO SOCIAL *</label>
                        <input type="text" id="razao_social" placeholder="Nome da empresa" required>
                    </div>

                    <div class="form-group">
                        <label for="cnpj">CNPJ *</label>
                        <input type="text" id="cnpj" data-mask="cnpj" placeholder="00.000.000/0001-00" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">TELEFONE *</label>
                        <input type="text" id="telefone" data-mask="telefone" placeholder="(21) 99999-0000" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-MAIL *</label>
                        <input type="email" id="email" placeholder="contato@empresa.com" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="clearForm('formFornecedores')">Cancelar</button>
                    <button type="submit" class="btn btn-save">Salvar Cadastro</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://unpkg.com/imask@7.6.1/dist/imask.min.js"></script>
    <script src="js/script.js"></script>
    <script>initFormPage('fornecedores');</script>
</body>
</html>
